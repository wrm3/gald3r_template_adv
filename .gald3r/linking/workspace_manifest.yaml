schema:
  name: gald3r_workspace_control_manifest
  version: 1.1.0
  format: yaml

workspace:
  name: "{workspace_name}"
  controller_project_id: "{project_id}"
  controller_path: "{absolute_path_to_this_project}"

repositories: []

controlled_members: []

routing_policy:
  default: controller
  member_gald3r_invariant:
    enabled: true
    marker_allowlist: [".identity", "PROJECT.md"]
    disallowed_paths:
      - TASKS.md
      - BUGS.md
      - PLAN.md
      - FEATURES.md
      - SUBSYSTEMS.md

pcac_relationship:
  role: standalone
  parent: null
  children: []
  siblings: []
