# T1238 — Workflow profile: software_dev (the current hardcoded default).
#
# Workflow profiles map per-domain task lifecycle vocabulary onto the gald3r
# task engine. This profile preserves the legacy gald3r software-development
# lifecycle exactly so the default behavior is unchanged.
#
# Activate by setting `workflow_profile: software_dev` in PROJECT.md or in
# an individual task's frontmatter (`workflow_profile:` overrides PROJECT.md).
# When no profile is set, software_dev is the implicit default.

id: software_dev
name: Software Development
description: >
  Default gald3r workflow for code repositories. Adversarial-review pipeline:
  concept (waiting) -> ready (pending) -> implementer claims (in-progress) ->
  awaiting-verification -> independent reviewer signs off (done) or returns it
  (failed). Bug variants share the same flow.

# Status lifecycle, in canonical order. Each entry mirrors the existing
# gald3r symbols + frontmatter strings so legacy tasks need no migration.
task_statuses:
  - id: waiting
    symbol: "[⌛]"
    description: "Concept recorded; spec_task_reqs or spec_reqs not yet met. Skipped by g-go / g-mission."
    skip_in_pipeline: true
  - id: pending
    symbol: "[📋]"
    description: "Spec complete; ready for implementer pickup."
    skip_in_pipeline: false
  - id: in-progress
    symbol: "[🔄]"
    description: "Implementer has claimed; work in flight."
    skip_in_pipeline: false
  - id: awaiting-verification
    symbol: "[🔍]"
    description: "Implementation complete; awaiting independent reviewer (Phase 2)."
    skip_in_pipeline: false
  - id: failed
    symbol: "[❌]"
    description: "Reviewer FAIL or implementation impasse; returned to pending after triage."
    skip_in_pipeline: true
  - id: done
    symbol: "[✅]"
    description: "Reviewer PASS; archived to tasks/completed/YYYY/MM/."
    skip_in_pipeline: true
  - id: paused
    symbol: "[⏸️]"
    description: "Manually paused; never picked up by automation until unpaused."
    skip_in_pipeline: true
  - id: cancelled
    symbol: "[🚫]"
    description: "Terminal — work no longer wanted."
    skip_in_pipeline: true
  - id: needs-attention
    symbol: "[🚨]"
    description: "Stuck-loop or user-flagged; humans only — automation skips."
    skip_in_pipeline: true

# Review gate is the canonical g-go-review independent-agent pass.
review_gate:
  type: independent_review
  reviewer: g-go-review
  description: "Fresh agent reads acceptance criteria + diff and returns PASS/FAIL."

# Task type vocabulary. These map to the `type:` frontmatter field.
task_types:
  - feature
  - bug_fix
  - refactor
  - documentation
  - chore
  - test
