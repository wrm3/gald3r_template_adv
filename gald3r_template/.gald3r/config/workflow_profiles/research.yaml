# T1238 — Workflow profile: research.
#
# Targets science / engineering research projects, academic write-ups,
# and any workflow with an explicit hypothesis -> data -> publication arc.
#
# Activate by setting `workflow_profile: research` in PROJECT.md or in an
# individual task's frontmatter.

id: research
name: Research
description: >
  Scientific / engineering research workflow: hypothesis -> data collection ->
  analysis -> writing -> peer review -> publication. Adversarial-review gate
  is the peer-review pass — it MUST come from an independent reviewer, not
  the original investigator.

task_statuses:
  - id: waiting
    symbol: "[⌛]"
    description: "Question captured; prereqs (ethics approval, dataset access, funding) pending."
    skip_in_pipeline: true
  - id: hypothesis
    symbol: "[🧠]"
    description: "Hypothesis stated; methodology outlined; ready for data collection."
    skip_in_pipeline: false
  - id: data_collection
    symbol: "[🧪]"
    description: "Experiments running, surveys live, datasets being gathered."
    skip_in_pipeline: false
  - id: analysis
    symbol: "[📊]"
    description: "Data cleaned; statistical / qualitative analysis underway."
    skip_in_pipeline: false
  - id: writing
    symbol: "[📝]"
    description: "Manuscript / report draft in flight."
    skip_in_pipeline: false
  - id: peer_review
    symbol: "[🔍]"
    description: "Submitted to peer reviewer(s); awaiting independent verdict."
    skip_in_pipeline: false
  - id: published
    symbol: "[✅]"
    description: "Accepted and published / preprinted; archived."
    skip_in_pipeline: true
  - id: retracted
    symbol: "[❌]"
    description: "Retracted post-publication; preserved for audit but no longer active."
    skip_in_pipeline: true
  - id: paused
    symbol: "[⏸️]"
    description: "Held — pending replication, missing data, or co-author delay."
    skip_in_pipeline: true
  - id: cancelled
    symbol: "[🚫]"
    description: "Investigation abandoned (e.g. preempted by another publication)."
    skip_in_pipeline: true

review_gate:
  type: peer_review
  reviewer: g-go-review
  description: "Independent reviewer checks methodology, data integrity, statistical validity, and reproducibility."

task_types:
  - hypothesis
  - experiment
  - dataset
  - analysis
  - manuscript
  - revision
  - replication
