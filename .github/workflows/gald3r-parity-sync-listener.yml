name: gald3r parity sync listener

# T1049: Receives repository_dispatch from gald3r_dev when canonical skills/agents/commands
# change in the controller. Syncs root skills/agents/commands/ to platform dirs in this repo.
#
# Triggered by gald3r_dev CI via:
#   POST /repos/gald3r/gald3r_template_*/dispatches
#   { "event_type": "gald3r-parity-sync", "client_payload": { "source_sha": "..." } }

on:
  repository_dispatch:
    types:
      - gald3r-parity-sync
  workflow_dispatch:
    inputs:
      sync_mode:
        description: 'report or apply'
        required: true
        default: 'apply'
        type: choice
        options:
          - report
          - apply

permissions:
  contents: write

concurrency:
  group: gald3r-parity-sync-listener-${{ github.ref }}
  cancel-in-progress: false

jobs:
  parity-sync:
    name: Sync canonical source → platform dirs
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Log dispatch source
        shell: pwsh
        run: |
          $sha = '${{ github.event.client_payload.source_sha }}'
          if (-not [string]::IsNullOrEmpty($sha)) {
            Write-Host "Triggered by gald3r_dev@$sha"
          } else {
            Write-Host "Triggered by workflow_dispatch or manual run"
          }

      - name: Sync root canonical source → platform dirs
        shell: pwsh
        run: |
          $mode = '${{ github.event.inputs.sync_mode }}'
          if ([string]::IsNullOrEmpty($mode)) { $mode = 'apply' }

          # Platforms with full skills+agents+commands layout
          $fullPlatforms = @('.cursor', '.claude', '.agent', '.codex', '.opencode')
          foreach ($plat in $fullPlatforms) {
            foreach ($sub in @('skills', 'agents', 'commands')) {
              $src = Join-Path $env:GITHUB_WORKSPACE $sub
              $dst = Join-Path $env:GITHUB_WORKSPACE "$plat\$sub"
              if (-not (Test-Path $src)) {
                Write-Host "  SKIP: root/$sub does not exist"
                continue
              }
              if ($mode -eq 'apply') {
                Write-Host "  Syncing $sub/ -> $plat/$sub/"
                robocopy $src $dst /E /NFL /NDL /NJH /NJS /NC /NS /NP
              } else {
                $srcCount = (Get-ChildItem $src -Recurse -File).Count
                $dstCount = if (Test-Path $dst) { (Get-ChildItem $dst -Recurse -File).Count } else { 0 }
                Write-Host "  DRY-RUN: $sub/ ($srcCount) -> $plat/$sub/ ($dstCount in dst)"
              }
            }
          }
          # .copilot: commands only
          $cpSrc = Join-Path $env:GITHUB_WORKSPACE 'commands'
          $cpDst = Join-Path $env:GITHUB_WORKSPACE '.copilot\commands'
          if (Test-Path $cpSrc) {
            if ($mode -eq 'apply') {
              Write-Host "  Syncing commands/ -> .copilot/commands/"
              robocopy $cpSrc $cpDst /E /NFL /NDL /NJH /NJS /NC /NS /NP
            }
          }
          Write-Host "Sync complete (mode=$mode)"

      - name: Detect changes
        id: detect
        shell: pwsh
        run: |
          $porcelain = git status --porcelain
          if ([string]::IsNullOrWhiteSpace($porcelain)) {
            "changed=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "No changes — already in sync."
          } else {
            "changed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Changes detected:"
            Write-Host $porcelain
          }

      - name: Stage parity-owned paths only
        if: steps.detect.outputs.changed == 'true'
        shell: pwsh
        run: |
          $allowed = @(
            'skills/',
            'agents/',
            'commands/',
            'plugins/',
            '.cursor/',
            '.claude/',
            '.agent/',
            '.codex/',
            '.opencode/',
            '.copilot/'
          )
          foreach ($p in $allowed) {
            if (Test-Path $p) { git add -- $p }
          }

      - name: Commit parity sync
        if: steps.detect.outputs.changed == 'true'
        shell: pwsh
        run: |
          $staged = git diff --cached --name-only
          if ([string]::IsNullOrWhiteSpace($staged)) {
            Write-Host "Nothing staged — skipping commit."
            exit 0
          }
          $sha = '${{ github.event.client_payload.source_sha }}'
          $shaNote = if ($sha) { "gald3r_dev@$sha" } else { "manual dispatch" }
          $msg = "chore(parity): auto-sync platform files from canonical source [skip ci]`n`nTriggered by $shaNote via repository_dispatch gald3r-parity-sync."
          git commit -m $msg
          git push origin HEAD:${{ github.ref_name }}
          Write-Host "Committed and pushed."

